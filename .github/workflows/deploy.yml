name: Checkout Code

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            if [ ! -d "$HOME/TradeON/.git" ]; then
              git clone https://github.com/dhruv-38/TradeON.git "$HOME/TradeON"
            fi

            cd "$HOME/TradeON"
            git pull origin main

            cat > .env <<EOF
            NODE_ENV=${{ secrets.NODE_ENV }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            COOKIE_DOMAIN=${{ secrets.COOKIE_DOMAIN }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
            EOF

            docker compose down
            docker compose pull postgres redis timescaledb
            docker compose build backend
            docker compose build engine
            docker compose build engine-worker
            docker compose build price-ingestor
            docker compose build batch-uploader
            docker compose build ws
            docker compose build web
            docker compose up -d --build
            docker image prune -af
            docker builder prune -af
