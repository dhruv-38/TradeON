name: Checkout Code

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            if [ ! -d "$HOME/TradeON/.git" ]; then
              git clone https://github.com/dhruv-38/TradeON.git "$HOME/TradeON"
            fi

            cd "$HOME/TradeON"
            git pull origin main
            docker compose down
            for service in backend price-ingestor engine-worker batch-uploader engine ws web; do
              docker compose build "$service"
            done
            docker compose up -d
            docker image prune -f
