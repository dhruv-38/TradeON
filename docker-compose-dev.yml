services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: TradeON
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d TradeON"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  timescaledb:
    image: timescale/timescaledb:latest-pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tradeon_timescale
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tradeon_timescale"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: dev.Dockerfile
    image: tradeon-app
    command: bun run apps/Backend/src/index.ts
    ports:
      - "8000:8000"
    environment: &app_env
      NODE_ENV: production
      JWT_SECRET: thisissecret
      COOKIE_DOMAIN: tradeon.100xdc.com
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/TradeON?schema=public
      BACKPACK_WS_URL: wss://ws.backpack.exchange
      TIMESCALE_DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/tradeon_timescale
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20

  price-ingestor:
    image: tradeon-app
    command: bun run apps/price-ingestor/src/index.ts
    environment: *app_env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_healthy

  engine-worker:
    image: tradeon-app
    command: bun run apps/engine-worker/src/index.ts
    environment: *app_env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_healthy

  batch-uploader:
    image: tradeon-app
    command: bun run apps/batch-uploader/src/index.ts
    environment: *app_env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started

  engine:
    image: tradeon-app
    command: bun run apps/engine/src/index.ts
    environment: *app_env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_healthy

  ws:
    image: tradeon-app
    command: bun run apps/ws/src/index.ts
    ports:
      - "8080:8080"
    environment: *app_env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://be.tradeon.100xdc.com/api/v1
        NEXT_PUBLIC_WS_URL: wss://ws.tradeon.100xdc.com
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  timescaledb_data:
  redis_data: