services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: TradeON
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d TradeON"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tradeon_timescale
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tradeon_timescale"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: apps/Backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      JWT_SECRET: thisissecret
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/TradeON?schema=public
      BACKPACK_WS_URL: wss://ws.backpack.exchange
      TIMESCALE_DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/tradeon_timescale
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: [
        "CMD",
        "bun",
        "-e",
        "fetch('http://localhost:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      ]
      interval: 5s
      timeout: 5s
      retries: 20

  price-ingestor:
    build:
      context: .
      dockerfile: apps/price-ingestor/Dockerfile
    environment:
      NODE_ENV: production
      JWT_SECRET: thisissecret
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/TradeON?schema=public
      BACKPACK_WS_URL: wss://ws.backpack.exchange
      TIMESCALE_DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/tradeon_timescale
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_healthy
  
  engine-worker:
    build:
      context: .
      dockerfile: apps/engine-worker/Dockerfile
    environment:
      NODE_ENV: production
      JWT_SECRET: thisissecret
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/TradeON?schema=public
      BACKPACK_WS_URL: wss://ws.backpack.exchange
      TIMESCALE_DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/tradeon_timescale
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_healthy
  
  batch-uploader:
    build:
      context: .
      dockerfile: apps/batch-uploader/Dockerfile
    environment:
      NODE_ENV: production
      JWT_SECRET: thisissecret
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/TradeON?schema=public
      BACKPACK_WS_URL: wss://ws.backpack.exchange
      TIMESCALE_DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/tradeon_timescale
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started
  
  engine:
    build:
      context: .
      dockerfile: apps/engine/Dockerfile
    environment:
      NODE_ENV: production
      JWT_SECRET: thisissecret
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/TradeON?schema=public
      BACKPACK_WS_URL: wss://ws.backpack.exchange
      TIMESCALE_DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/tradeon_timescale
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_healthy
  
  ws:
    build:
      context: .
      dockerfile: apps/ws/Dockerfile
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      JWT_SECRET: thisissecret
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/TradeON?schema=public
      BACKPACK_WS_URL: wss://ws.backpack.exchange
      TIMESCALE_DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/tradeon_timescale
    depends_on:
      redis:
        condition: service_started
      backend:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://be.tradeon.100xdc.com
      NEXT_PUBLIC_WS_URL: wss://ws.tradeon.100xdc.com
    depends_on:
      backend:
        condition: service_healthy
  
volumes:
  postgres_data:
  timescaledb_data:
  redis_data: